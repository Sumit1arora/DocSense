spring:
  application:
    name: DocSense

  # PostgreSQL — JPA (tenants table + document_chunks table)
  datasource:
    url: jdbc:postgresql://localhost:5432/docsense
    username: docsense
    password: docsense123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate       # Flyway owns schema, Hibernate only validates
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # Flyway — runs SQL migration files from db/migration/ on startup
  flyway:
    enabled: true
    locations: classpath:db/migration

  # MongoDB — document metadata
  data:
    mongodb:
      uri: mongodb://docsense:docsense123@localhost:27017/docsense?authSource=admin
    redis:
      host: localhost
      port: 6379

  # File upload limits
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

  # Async thread pool for ingestion
  task:
    execution:
      pool:
        core-size: 4
        max-size: 8
        queue-capacity: 100

# OpenAI — read key from environment variable
openai:
  api-key: ${OPENAI_API_KEY}
  base-url: https://api.openai.com